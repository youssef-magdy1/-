<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شطف ابو عوف</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  :root{
    --ink: #1B1F2A;
    --ink-soft: #232838;
    --bone: #EDE6D6;
    --brass: #B8894F;
    --brass-bright: #D3A56C;
    --slate: #8A93A6;
    --line: rgba(237,230,214,0.14);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    background:var(--ink);
    color:var(--bone);
    font-family:'Cairo', sans-serif;
    min-height:100vh;
  }

  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:32px 20px;
    position:relative;
    overflow-x:hidden;
  }

  .board-veil{
    position:fixed;
    inset:0;
    z-index:0;
    opacity:0.05;
    background-image:
      linear-gradient(45deg, var(--bone) 25%, transparent 25%),
      linear-gradient(-45deg, var(--bone) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--bone) 75%),
      linear-gradient(-45deg, transparent 75%, var(--bone) 75%);
    background-size:80px 80px;
    background-position:0 0, 0 40px, 40px -40px, -40px 0px;
    pointer-events:none;
  }

  .content{
    position:relative;
    z-index:1;
    max-width:520px;
    width:100%;
    text-align:center;
  }

  .ticker{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    letter-spacing:0.08em;
    color:var(--brass);
    margin-bottom:28px;
    opacity:0.85;
    display:flex;
    justify-content:center;
    gap:18px;
    direction: ltr; 
  }
  .ticker span{ color:var(--slate); }

  h1{
    font-weight:700;
    font-size:clamp(38px, 8vw, 60px);
    line-height:1.1;
    margin:0 0 12px 0;
  }
  h1 em{
    font-style:normal;
    font-weight:600;
    color:var(--brass-bright);
  }

  .tagline{
    font-size:16px;
    color:var(--slate);
    max-width:420px;
    margin:0 auto 40px auto;
    line-height:1.6;
  }

  .rule-strip{
    display:flex;
    justify-content:center;
    gap:0;
    margin-bottom:44px;
    font-size:13px;
    color:var(--slate);
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    padding:14px 0;
  }
  .rule-strip .cell{
    padding:0 16px;
    border-left:1px solid var(--line);
  }
  .rule-strip .cell:last-child{ border-left:none; }
  .rule-strip .cell b{
    color:var(--bone);
    font-weight:600;
  }

  .time-settings{
    display:flex;
    justify-content:center;
    gap:16px;
    margin-bottom:32px;
    flex-wrap:wrap;
  }

  .time-field{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    background:var(--ink-soft);
    border:1px solid var(--line);
    border-radius:4px;
    padding:12px 16px;
    min-width:140px;
  }

  .time-field label{
    font-size:12px;
    font-weight:600;
    letter-spacing:0.03em;
    color:var(--brass);
    margin-bottom:8px;
  }

  .time-field input{
    width:100%;
    font-family:'IBM Plex Mono',monospace;
    font-size:16px;
    color:var(--bone);
    background:var(--ink);
    border:1px solid var(--line);
    border-radius:3px;
    padding:8px 10px;
    direction: ltr;
    text-align:center;
  }

  .time-field input:focus{
    outline:none;
    border-color:var(--brass-bright);
  }

  .time-field input:disabled{
    opacity:0.5;
  }

  .presets{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:28px;
    flex-wrap:wrap;
  }

  .presets button{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    color:var(--slate);
    background:transparent;
    border:1px solid var(--line);
    border-radius:20px;
    padding:6px 16px;
    cursor:pointer;
    transition:border-color 0.15s ease, color 0.15s ease;
  }
  .presets button:hover{ border-color:var(--brass-bright); color:var(--bone); }
  .presets button.active{ border-color:var(--brass-bright); color:var(--brass-bright); }
  .presets button:disabled{ opacity:0.5; cursor:default; }

  button.cta{
    font-family:'Cairo',sans-serif;
    font-weight:600;
    font-size:16px;
    color:var(--ink);
    background:var(--brass-bright);
    border:none;
    padding:14px 40px;
    border-radius:2px;
    cursor:pointer;
    transition:transform 0.15s ease, background 0.15s ease;
  }
  button.cta:hover{ background:var(--brass); transform:translateY(-1px); }
  button.cta:active{ transform:translateY(0px); }
  button.cta:focus-visible{ outline:2px solid var(--bone); outline-offset:3px; }
  button.cta:disabled{ opacity:0.6; cursor:default; transform:none; }

  .status-line{
    margin-top:18px;
    font-size:13px;
    color:var(--slate);
    min-height:18px;
  }

  .link-card{
    display:none;
    margin-top:28px;
    background:var(--ink-soft);
    border:1px solid var(--line);
    border-radius:4px;
    padding:20px;
    text-align:right;
  }
  .link-card.show{ display:block; }

  .link-card .label{
    font-size:12px;
    font-weight: 600;
    letter-spacing:0.05em;
    color:var(--brass);
    margin-bottom:10px;
  }

  .link-row{
    display:flex;
    gap:8px;
  }

  .link-row input{
    flex:1;
    min-width:0;
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    color:var(--bone);
    background:var(--ink);
    border:1px solid var(--line);
    border-radius:3px;
    padding:10px 12px;
    direction: ltr; 
  }

  .link-row button{
    font-family:'Cairo',sans-serif;
    font-weight:500;
    font-size:13px;
    color:var(--bone);
    background:transparent;
    border:1px solid var(--brass);
    border-radius:3px;
    padding:0 18px;
    cursor:pointer;
    white-space:nowrap;
    transition:background 0.15s ease;
  }
  .link-row button:hover{ background:rgba(184,137,79,0.15); }

  .link-card .hint{
    margin-top:12px;
    font-size:13px;
    color:var(--slate);
    line-height:1.6;
  }

  footer{
    position:relative;
    z-index:1;
    margin-top:56px;
    font-size:12px;
    color:var(--slate);
    opacity:0.6;
  }
</style>
</head>
<body>

<div class="board-veil"></div>

<div class="content">

  <h1>شطف <em>ابو عوف</em></h1>
  <p class="tagline">ذي مانت عارف ابو عوف شخص عنيد مبيحبش التشطيف بس لازم يتشطف مرتين كمان فا خش عليه ياوحش</p>

  <div class="rule-strip">
    <div class="cell"><b>حركتان</b> في كل دور</div>
    <div class="cell">مفيش <b>كش</b> في اولى حركه</div>
    <div class="cell">اعمل لينك والعب</div>
  </div>

  <div class="presets" id="presets">
    <button type="button" data-time="1" data-inc="1">1+1</button>
    <button type="button" data-time="3" data-inc="2" class="active">3+2</button>
    <button type="button" data-time="5" data-inc="3">5+3</button>
    <button type="button" data-time="10" data-inc="5">10+5</button>
  </div>

  <div class="time-settings">
    <div class="time-field">
      <label for="timeInput">الوقت (دقايق)</label>
      <input type="number" id="timeInput" min="1" max="60" step="1" value="3">
    </div>
    <div class="time-field">
      <label for="incInput">الإضافة (ثواني)</label>
      <input type="number" id="incInput" min="0" max="60" step="1" value="2">
    </div>
  </div>

  <button class="cta" id="createBtn">ودي يابويا </button>
  <div class="status-line" id="statusLine"></div>

  <div class="link-card" id="linkCard">
    <div class="label">باصي اللينك ده لصاحبك</div>
    <div class="link-row">
      <input type="text" id="linkInput" readonly>
      <button id="copyBtn">نسخ</button>
    </div>
    <div class="hint">انسخ الليك وابعته لصاحبك. وادخل على البورد استناه جوا.</div>
    <button class="cta" id="enterBtn" style="margin-top:18px; width:100%;">خش علبورد</button>
  </div>

</div>

<script>
  const createBtn = document.getElementById('createBtn');
  const statusLine = document.getElementById('statusLine');
  const linkCard = document.getElementById('linkCard');
  const linkInput = document.getElementById('linkInput');
  const copyBtn = document.getElementById('copyBtn');
  const enterBtn = document.getElementById('enterBtn');
  const timeInput = document.getElementById('timeInput');
  const incInput = document.getElementById('incInput');
  const presetButtons = document.querySelectorAll('#presets button');

  let boardUrl = null;

  presetButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      timeInput.value = btn.dataset.time;
      incInput.value = btn.dataset.inc;
      presetButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // لو المستخدم عدّل الأرقام يدويًا، نشيل التظليل عن البريسِتس
  [timeInput, incInput].forEach(input => {
    input.addEventListener('input', () => {
      presetButtons.forEach(b => b.classList.remove('active'));
    });
  });

  createBtn.addEventListener('click', () => {
    createBtn.disabled = true;
    timeInput.disabled = true;
    incInput.disabled = true;
    presetButtons.forEach(b => b.disabled = true);
    statusLine.textContent = 'يتم...  ';

    const minutes = Math.min(60, Math.max(1, parseInt(timeInput.value, 10) || 3));
    const increment = Math.min(60, Math.max(0, parseInt(incInput.value, 10) || 0));

    const peer = new Peer();

    peer.on('open', (id) => {
      const gameUrl = new URL('game.html', window.location.href);
      gameUrl.searchParams.set('host', id);
      gameUrl.searchParams.set('as', 'host');
      gameUrl.searchParams.set('time', minutes);
      gameUrl.searchParams.set('inc', increment);
      boardUrl = gameUrl.toString();

      const joinUrl = new URL('game.html', window.location.href);
      joinUrl.searchParams.set('host', id);
      joinUrl.searchParams.set('time', minutes);
      joinUrl.searchParams.set('inc', increment);

      linkInput.value = joinUrl.toString();
      linkCard.classList.add('show');
      statusLine.textContent = 'الرابط جاهز — ابعت وخش.';
      createBtn.textContent = 'ضن ';
      createBtn.disabled = true;

      peer.destroy();
    });

    peer.on('error', (err) => {
      console.error(err);
      statusLine.textContent = 'فشل الاتصال. تحقق من الشبكة وحاول مجدداً.';
      createBtn.disabled = false;
      timeInput.disabled = false;
      incInput.disabled = false;
      presetButtons.forEach(b => b.disabled = false);
      createBtn.textContent = 'إنشاء لعبة';
    });
  });

  enterBtn.addEventListener('click', () => {
    if (boardUrl) window.location.href = boardUrl;
  });

  copyBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(linkInput.value);
      copyBtn.textContent = 'تم النسخ';
      setTimeout(() => { copyBtn.textContent = 'نسخ'; }, 1600);
    } catch (e) {
      linkInput.select();
      document.execCommand('copy');
    }
  });
</script>

</body>
</html>
